version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: venueflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: venueflow_api
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - JWT_SECRET=venueflow-dev-key
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
